<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KESCO 전국 점검지도</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=85ad2817ce8a886974a3fce65f856ab4&libraries=services,clusterer&autoload=false"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { width: 100%; height: 100vh; background: #f0f0f0; }
        #upload-box {
            position: absolute; top: 15px; left: 15px; z-index: 1000; 
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 260px;
            border: 2px solid #fae100;
        }
        #upload-btn {
            width: 100%; padding: 12px; background: #007bff; color: white;
            border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        #status { margin-top: 12px; font-size: 13px; font-weight: bold; color: #333; line-height: 1.4; }
        .error-text { color: #d32f2f; }
    </style>
</head>
<body>
    <div id="upload-box">
        <h3 style="margin:0 0 5px 0;">🌍 전국 점검 데이터 등록</h3>
        <p style="font-size:11px; color:#666; margin-bottom:10px;">엑셀(상호명, 주소)을 선택하세요.</p>
        <input type="file" id="excel-file" accept=".xlsx, .xls">
        <button id="upload-btn">지도에 표시하기</button>
        <div id="status">연결 확인 중...</div>
    </div>
    <div id="map"></div>

    <script>
        // 페이지 로드 시 카카오 지도 엔진을 강제로 깨웁니다.
        window.onload = function() {
            var statusMsg = document.getElementById('status');
            
            if (typeof kakao === 'undefined') {
                statusMsg.innerHTML = "<span class='error-text'>⚠️ 카카오 로드 실패!<br>1. 카카오 설정 저장 확인<br>2. 5분 뒤 다시 시도<br>3. 회사 Wi-Fi 대신 LTE 사용</span>";
                return;
            }

            kakao.maps.load(function() {
                statusMsg.innerText = "✅ 준비 완료! (파일을 올려주세요)";
                
                var mapContainer = document.getElementById('map');
                // 전국 어디든 보이도록 초기 중심을 대전으로 설정
                var mapOption = { center: new kakao.maps.LatLng(36.3504, 127.3845), level: 11 };
                var map = new kakao.maps.Map(mapContainer, mapOption);
                var clusterer = new kakao.maps.MarkerClusterer({ map: map, averageCenter: true, minLevel: 7 });
                var geocoder = new kakao.maps.services.Geocoder();

                // 기존 데이터 로드
                var saved = localStorage.getItem('kesco_map_data');
                if(saved) {
                    var data = JSON.parse(saved);
                    statusMsg.innerText = "기존 " + data.length + "건 로드 완료";
                    drawMarkers(data, map, clusterer);
                }

                document.getElementById('upload-btn').onclick = function() {
                    var fileInput = document.getElementById('excel-file');
                    if (!fileInput.files.length) { alert("파일을 선택해주세요!"); return; }
                    
                    statusMsg.innerText = "데이터 분석 중...";
                    var reader = new FileReader();
                    reader.onload = function(e) {
                        var workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                        var json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                        var successData = [];
                        var count = 0;
                        
                        json.forEach(function(row, i) {
                            setTimeout(function() {
                                var addr = row['주소'];
                                var name = row['상호명'] || row['대상처명'] || '이름없음';
                                if(addr) {
                                    geocoder.addressSearch(addr, function(res, stat) {
                                        if(stat === kakao.maps.services.Status.OK) {
                                            successData.push({title: name, lat: res[0].y, lng: res[0].x, address: addr, memo: row['비고'] || ''});
                                        }
                                        count++;
                                        statusMsg.innerText = "진행률: " + count + " / " + json.length;
                                        if(count === json.length) {
                                            localStorage.setItem('kesco_map_data', JSON.stringify(successData));
                                            drawMarkers(successData, map, clusterer);
                                            statusMsg.style.color = "blue";
                                            statusMsg.innerText = "완료: " + successData.length + "건 등록됨";
                                        }
                                    });
                                } else { count++; }
                            }, i * 30); // 속도 향상
                        });
                    };
                    reader.readAsArrayBuffer(fileInput.files[0]);
                };
            });
        };

        function drawMarkers(sites, map, clusterer) {
            clusterer.clear();
            var markers = sites.map(function(s) {
                var m = new kakao.maps.Marker({ position: new kakao.maps.LatLng(s.lat, s.lng) });
                var content = '<div style="padding:10px;font-size:12px;width:180px;">' +
                              '<b>'+s.title+'</b><br>'+s.address+'<br><span style="color:blue">'+s.memo+'</span>' +
                              '<a href="https://map.kakao.com/link/to/'+s.title+','+s.lat+','+s.lng+'" target="_blank" style="display:block;margin-top:8px;background:#fae100;text-align:center;padding:6px;border-radius:4px;text-decoration:none;color:black;font-weight:bold;">길찾기</a></div>';
                var iw = new kakao.maps.InfoWindow({ content: content, removable: true });
                kakao.maps.event.addListener(m, 'click', function() { iw.open(map, m); });
                return m;
            });
            clusterer.addMarkers(markers);
            // 데이터가 있을 때만 첫 번째 위치로 지도 중심 이동 (전국구 대응)
            if(markers.length > 0) {
                map.setCenter(markers[0].getPosition());
                map.setLevel(9);
            }
        }
    </script>
</body>
</html>
