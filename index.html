<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KESCO 점검지도</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=85ad2817ce8a886974a3fce65f856ab4&libraries=services,clusterer"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { width: 100%; height: 100vh; }
        #upload-box {
            position: absolute; top: 15px; left: 15px; z-index: 1000; 
            background: white; padding: 15px; border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 250px;
            border: 2px solid #fae100;
        }
        #upload-btn {
            width: 100%; padding: 10px; background: #007bff; color: white;
            border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        #status { margin-top: 10px; font-size: 13px; font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <div id="upload-box">
        <h3 style="margin:0 0 10px 0;">📍 점검 데이터 등록</h3>
        <input type="file" id="excel-file" accept=".xlsx, .xls">
        <button id="upload-btn">등록하기</button>
        <div id="status">대기 중...</div>
    </div>
    <div id="map"></div>

    <script>
        // 지도가 뜰 수 있는지 확인하는 안전장치
        window.onload = function() {
            if (typeof kakao === 'undefined') {
                document.getElementById('status').innerHTML = "<span style='color:red;'>⚠️ 카카오 지도 로드 실패!<br>카카오 설정에서 도메인을 확인하세요.</span>";
                return;
            }

            var mapContainer = document.getElementById('map');
            var mapOption = { center: new kakao.maps.LatLng(35.8920, 127.1550), level: 8 };
            var map = new kakao.maps.Map(mapContainer, mapOption);
            var clusterer = new kakao.maps.MarkerClusterer({ map: map, averageCenter: true, minLevel: 6 });
            var geocoder = new kakao.maps.services.Geocoder();

            // 저장된 데이터 불러오기
            var saved = localStorage.getItem('kesco_map_data');
            if(saved) {
                var data = JSON.parse(saved);
                document.getElementById('status').innerText = "이전 " + data.length + "건 로드됨";
                drawMarkers(data);
            }

            document.getElementById('upload-btn').onclick = function() {
                var file = document.getElementById('excel-file').files[0];
                if (!file) { alert("파일을 선택하세요!"); return; }

                var reader = new FileReader();
                reader.onload = function(e) {
                    var workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                    var json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                    var successData = [];
                    var count = 0;
                    
                    document.getElementById('status').innerText = "좌표 변환 시작...";

                    json.forEach(function(row, i) {
                        setTimeout(function() {
                            var addr = row['주소'];
                            var name = row['상호명'] || row['대상처명'] || '이름없음';
                            if(addr) {
                                geocoder.addressSearch(addr, function(res, status) {
                                    if(status === kakao.maps.services.Status.OK) {
                                        successData.push({title: name, lat: res[0].y, lng: res[0].x, address: addr, memo: row['비고'] || ''});
                                    }
                                    count++;
                                    if(count === json.length) {
                                        localStorage.setItem('kesco_map_data', JSON.stringify(successData));
                                        drawMarkers(successData);
                                        document.getElementById('status').innerText = "완료: " + successData.length + "건";
                                    }
                                });
                            } else { count++; }
                        }, i * 100);
                    });
                };
                reader.readAsArrayBuffer(file);
            };

            function drawMarkers(sites) {
                clusterer.clear();
                var markers = sites.map(function(s) {
                    var m = new kakao.maps.Marker({ position: new kakao.maps.LatLng(s.lat, s.lng) });
                    var iw = new kakao.maps.InfoWindow({ content: '<div style="padding:10px;font-size:12px;"><b>'+s.title+'</b><br>'+s.address+'<br><a href="https://map.kakao.com/link/to/'+s.title+','+s.lat+','+s.lng+'" target="_blank" style="display:block;margin-top:5px;background:#fae100;text-align:center;padding:5px;border-radius:4px;text-decoration:none;color:black;">길찾기</a></div>', removable: true });
                    kakao.maps.event.addListener(m, 'click', function() { iw.open(map, m); });
                    return m;
                });
                clusterer.addMarkers(markers);
                if(markers.length > 0) map.setCenter(markers[0].getPosition());
            }
        };
    </script>
</body>
</html>
