<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KESCO 전국 점검지도</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=85ad2817ce8a886974a3fce65f856ab4&libraries=services,clusterer"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { width: 100%; height: 100vh; background: #eee; }
        #upload-box {
            position: absolute; top: 15px; left: 15px; z-index: 1000; 
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 260px; border: 2px solid #fae100;
        }
        #upload-btn {
            width: 100%; padding: 12px; background: #007bff; color: white;
            border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        #status { margin-top: 12px; font-size: 13px; font-weight: bold; color: #333; line-height: 1.4; }
    </style>
</head>
<body>
    <div id="upload-box">
        <h3 style="margin:0 0 5px 0;">🌍 전국 점검 데이터 등록</h3>
        <input type="file" id="excel-file" accept=".xlsx, .xls">
        <button id="upload-btn">지도에 표시하기</button>
        <div id="status">연결 확인 중...</div>
    </div>
    <div id="map"></div>

    <script>
        window.onload = function() {
            var statusMsg = document.getElementById('status');
            
            // 1. 카카오 연결 상태 진단
            if (typeof kakao === 'undefined' || !kakao.maps) {
                // 현재 접속 중인 주소를 정확히 추출해서 보여줍니다.
                var currentUrl = window.location.origin;
                statusMsg.innerHTML = "<span style='color:red;'>⚠️ 연결 실패 (401 에러)</span><br><br>" +
                    "카카오 설정에 아래 주소를 복사해서 추가하세요:<br>" +
                    "<b style='background:#ffff00; padding:2px;'>" + currentUrl + "</b><br><br>" +
                    "또는 <b style='background:#ffff00; padding:2px;'>" + currentUrl + "/kesco</b>";
                return;
            }

            statusMsg.innerText = "✅ 준비 완료 (파일을 올려주세요)";
            
            var mapContainer = document.getElementById('map');
            var map = new kakao.maps.Map(mapContainer, { 
                center: new kakao.maps.LatLng(36.3, 127.5), 
                level: 12 
            });
            var clusterer = new kakao.maps.MarkerClusterer({ map: map, averageCenter: true, minLevel: 7 });
            var geocoder = new kakao.maps.services.Geocoder();

            // 저장된 데이터가 있으면 로드
            var saved = localStorage.getItem('kesco_map_data');
            if(saved) drawMarkers(JSON.parse(saved), map, clusterer);

            document.getElementById('upload-btn').onclick = function() {
                var file = document.getElementById('excel-file').files[0];
                if (!file) { alert("파일을 선택하세요!"); return; }
                
                statusMsg.innerText = "전국 데이터 분석 중...";
                var reader = new FileReader();
                reader.onload = function(e) {
                    var workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                    var json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                    var successData = [];
                    var count = 0;
                    
                    json.forEach(function(row, i) {
                        setTimeout(function() {
                            var addr = row['주소'];
                            if(addr) {
                                geocoder.addressSearch(addr, function(res, stat) {
                                    if(stat === kakao.maps.services.Status.OK) {
                                        successData.push({
                                            title: row['상호명'] || row['대상처명'] || '이름없음', 
                                            lat: res[0].y, lng: res[0].x, address: addr, memo: row['비고'] || ''
                                        });
                                    }
                                    count++;
                                    statusMsg.innerText = "진행률: " + count + " / " + json.length;
                                    if(count === json.length) {
                                        localStorage.setItem('kesco_map_data', JSON.stringify(successData));
                                        drawMarkers(successData, map, clusterer);
                                        statusMsg.innerText = "완료: " + successData.length + "건 표시됨";
                                    }
                                });
                            } else { count++; }
                        }, i * 30);
                    });
                };
                reader.readAsArrayBuffer(file);
            };

            function drawMarkers(sites, map, clusterer) {
                clusterer.clear();
                var markers = sites.map(function(s) {
                    var m = new kakao.maps.Marker({ position: new kakao.maps.LatLng(s.lat, s.lng) });
                    var iw = new kakao.maps.InfoWindow({ 
                        content: '<div style="padding:10px;font-size:12px;width:180px;"><b>'+s.title+'</b><br>'+s.address+'<br><a href="https://map.kakao.com/link/to/'+s.title+','+s.lat+','+s.lng+'" target="_blank" style="display:block;margin-top:8px;background:#fae100;text-align:center;padding:5px;border-radius:4px;text-decoration:none;color:black;">길찾기</a></div>',
                        removable: true 
                    });
                    kakao.maps.event.addListener(m, 'click', function() { iw.open(map, m); });
                    return m;
                });
                clusterer.addMarkers(markers);
                if(markers.length > 0) {
                    map.setCenter(markers[0].getPosition());
                    map.setLevel(9);
                }
            }
        };
    </script>
</body>
</html>
