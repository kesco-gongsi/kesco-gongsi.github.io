<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>점검데이터 위치 표시</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; }
        #map { width: 100%; height: 100vh; background: #eee; }
        #upload-box {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 260px; border: 2px solid #fae100;
        }
        #upload-box h3 { margin: 0 0 10px 0; font-size: 15px; }
        input[type="file"] { width: 100%; font-size: 12px; margin-bottom: 10px; }
        button {
            width: 100%; padding: 10px; border: none; border-radius: 6px; 
            font-weight: bold; cursor: pointer; margin-top: 6px; font-size: 14px;
        }
        #upload-btn { background: #007bff; color: white; }
        #loc-watch-btn { background: #28a745; color: white; }
        #clear-btn { background: #dc3545; color: white; font-size: 12px; }
        #status { margin-top: 12px; font-size: 12px; font-weight: bold; color: #d32f2f; line-height: 1.4; }
        .my-loc-dot { width: 18px; height: 18px; background: #007bff; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(0,123,255,0.8); }
    </style>
</head>
<body>
    <div id="upload-box">
        <h3>🌍 점검데이터 위치 표시ver 1.0</h3>
        <input type="file" id="excel-file" accept=".xlsx, .xls">
        <button id="upload-btn">지도에 표시하기</button>
        <button id="loc-watch-btn">📍 내 위치 추적 시작</button>
        <button id="clear-btn">🗑 데이터 초기화</button>
        <div id="status">카카오 지도 로딩 시도 중...</div>
    </div>
    <div id="map"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=85ad2817ce8a886974a3fce65f856ab4&libraries=services,clusterer"></script>
    
    <script>
        var map, clusterer, geocoder, watchId = null, myLocMarker = null;

        // [핵심] 지도가 로드될 때까지 0.5초마다 체크하는 안전장치
        var checkInterval = setInterval(function() {
            if (typeof kakao !== 'undefined' && kakao.maps && kakao.maps.services) {
                clearInterval(checkInterval);
                initMap();
            }
        }, 500);

        // 5초 후에도 안 뜨면 에러 메시지 출력
        setTimeout(function() {
            if (!map) {
                document.getElementById('status').innerHTML = "⚠️ 지도 로드 지연 중<br>1. 카카오 설정 재확인<br>2. AdBlock 등 광고 차단 해제";
            }
        }, 5000);

        function initMap() {
            var statusEl = document.getElementById('status');
            statusEl.style.color = "#333";
            statusEl.innerText = '✅ 준비 완료';

            var mapContainer = document.getElementById('map');
            map = new kakao.maps.Map(mapContainer, {
                center: new kakao.maps.LatLng(36.35, 127.5),
                level: 12
            });
            clusterer = new kakao.maps.MarkerClusterer({ map: map, averageCenter: true, minLevel: 7 });
            geocoder = new kakao.maps.services.Geocoder();

            try {
                var saved = localStorage.getItem('kesco_map_data');
                if (saved) drawMarkers(JSON.parse(saved));
            } catch (e) {}

            document.getElementById('upload-btn').onclick = processExcel;
            document.getElementById('loc-watch-btn').onclick = toggleWatchLocation;
            document.getElementById('clear-btn').onclick = clearData;
        }

        function toggleWatchLocation() {
            var btn = document.getElementById('loc-watch-btn');
            var statusEl = document.getElementById('status');
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                if (myLocMarker) myLocMarker.setMap(null);
                myLocMarker = null;
                btn.innerText = "📍 내 위치 추적 시작";
                btn.style.background = "#28a745";
                statusEl.innerText = "추적 중단됨";
            } else {
                btn.innerText = "🛑 추적 중단";
                btn.style.background = "#ffc107"; btn.style.color = "black";
                watchId = navigator.geolocation.watchPosition(function(pos) {
                    var locPos = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
                    if (!myLocMarker) {
                        myLocMarker = new kakao.maps.CustomOverlay({ position: locPos, content: '<div class="my-loc-dot"></div>', map: map });
                        map.setCenter(locPos); map.setLevel(5);
                    } else { myLocMarker.setPosition(locPos); }
                    statusEl.innerText = "📡 실시간 위치 수신 중...";
                }, null, { enableHighAccuracy: true });
            }
        }

        function drawMarkers(sites) {
            clusterer.clear();
            var markers = sites.map(function (s) {
                var marker = new kakao.maps.Marker({ position: new kakao.maps.LatLng(s.lat, s.lng) });
                var iw = new kakao.maps.InfoWindow({ 
                    content: '<div style="padding:10px;font-size:12px;width:200px;"><b>'+s.title+'</b><br>'+s.address+'<br><a href="https://map.kakao.com/link/to/'+encodeURIComponent(s.title)+','+s.lat+','+s.lng+'" target="_blank" style="display:block;margin-top:8px;background:#fae100;text-align:center;padding:7px;border-radius:4px;text-decoration:none;color:black;font-weight:bold;">길찾기</a></div>',
                    removable: true 
                });
                kakao.maps.event.addListener(marker, 'click', function () { iw.open(map, marker); });
                return marker;
            });
            clusterer.addMarkers(markers);
            if (markers.length > 0) { map.setCenter(markers[0].getPosition()); map.setLevel(9); }
        }

        function processExcel() {
            var file = document.getElementById('excel-file').files[0];
            if (!file) { alert('파일 선택 필수!'); return; }
            var reader = new FileReader();
            reader.onload = function (e) {
                var json = XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(e.target.result), { type: 'array' }).Sheets[XLSX.read(new Uint8Array(e.target.result), { type: 'array' }).SheetNames[0]]);
                var successData = [], count = 0;
                json.forEach(function (row, i) {
                    setTimeout(function () {
                        var addr = row['주소'] || row['address'];
                        if (addr) {
                            geocoder.addressSearch(addr, function (res, stat) {
                                if (stat === kakao.maps.services.Status.OK) {
                                    successData.push({ title: row['상호명'] || row['대상처명'] || '이름없음', lat: res[0].y, lng: res[0].x, address: addr, memo: row['비고'] || '' });
                                }
                                count++;
                                document.getElementById('status').innerText = '변환 중... (' + count + '/' + json.length + ')';
                                if (count === json.length) {
                                    localStorage.setItem('kesco_map_data', JSON.stringify(successData));
                                    drawMarkers(successData);
                                    document.getElementById('status').innerText = '✅ 완료: ' + successData.length + '건 표시';
                                }
                            });
                        } else { count++; }
                    }, i * 35);
                });
            };
            reader.readAsArrayBuffer(file);
        }

        function clearData() {
            if (confirm('모든 데이터를 삭제할까요?')) {
                localStorage.removeItem('kesco_map_data');
                clusterer.clear();
                document.getElementById('status').innerText = '🗑 초기화 완료';
            }
        }
    </script>
</body>
</html>
